name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday 03:00 UTC to catch newly published advisories.
    - cron: "0 3 * * 1"

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0

      # cargo-deny does not support --locked; Cargo.lock drift is caught by
      # the separate ci.yml "Cargo.lock drift check" step.
      - name: cargo deny check
        run: >
          cargo deny
          --manifest-path rust/fuji-rs/Cargo.toml
          check
